<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hibiki 響 — Music Player</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Main CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar navigation -->
    <aside class="sidebar">
      <div class="logo" aria-label="Hibiki music player logo">
        <span class="logo-hi">Hi</span><span class="logo-biki">biki</span>
        <span class="logo-kanji">響</span>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <button class="nav-item active" data-view="home" type="button">
          <span class="nav-icon">⌂</span>
          <span>Home</span>
        </button>
        <button class="nav-item" data-action="search" type="button">
          <span class="nav-icon">⌕</span>
          <span>Search</span>
        </button>
        <button class="nav-item" data-view="playlist" type="button">
          <span class="nav-icon">♡</span>
          <span>Playlist</span>
        </button>
        <button class="nav-item" data-view="recent" type="button">
          <span class="nav-icon">↺</span>
          <span>Recently Played</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <p>Playlist and history are saved in your browser.</p>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="searchInput" type="text" placeholder="Search songs or artists..." autocomplete="off" />
          <button id="searchBtn" type="button">Search</button>
        </div>

        <div class="top-actions">
          <div class="api-key-wrap">
            <input id="apiKey" type="password" placeholder="Optional: paste YouTube API key for real search" autocomplete="off" />
            <button id="forgetApiKeyBtn" type="button" title="Remove saved API key">Forget key</button>
          </div>
          <button id="themeBtn" class="theme-btn" type="button">🌙 Dark</button>
        </div>
      </header>

      <section class="content" aria-live="polite">
        <h1 id="sectionTitle" class="section-title">Featured tracks</h1>
        <div id="results" class="results-grid"></div>

        <div id="loadingState" class="loading-state" hidden>
          <div class="spinner"></div>
          <span>Searching...</span>
        </div>

        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">🎵</div>
          <div>No songs here</div>
          <small>Search or save songs to your playlist</small>
        </div>
      </section>
    </main>

    <!-- Bottom music player -->
    <footer class="player-bar" id="playerBar">
      <div class="np-left">
        <div class="np-thumb-wrap">
          <img id="npThumb" src="" alt="Current song thumbnail" />
          <div class="np-thumb-placeholder" id="npThumbPlaceholder">♪</div>
        </div>
        <div class="np-info">
          <div class="np-title" id="npTitle">Nothing playing</div>
          <div class="np-channel" id="npChannel">Select a track to start</div>
        </div>
        <button class="like-btn" id="likeBtn" type="button" title="Save to playlist">♡</button>
      </div>

      <div class="np-center">
        <div class="controls">
          <button class="ctrl-btn" id="shuffleBtn" type="button" title="Shuffle">⇄</button>
          <button class="ctrl-btn" id="prevBtn" type="button" title="Previous">⏮</button>
          <button class="play-btn" id="playBtn" type="button" title="Play/Pause">▶</button>
          <button class="ctrl-btn" id="nextBtn" type="button" title="Next">⏭</button>
          <button class="ctrl-btn" id="repeatBtn" type="button" title="Repeat">↻</button>
        </div>

        <div class="progress-wrap">
          <span class="time" id="elapsed">0:00</span>
          <div class="progress-bar" id="progressBar" role="slider" aria-label="Song progress">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="time" id="duration">0:00</span>
        </div>
      </div>

      <div class="np-right">
        <button class="ctrl-btn" id="muteBtn" type="button" title="Mute">🔊</button>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80" />
        <button class="open-yt-btn" id="openYtBtn" type="button" hidden>YouTube</button>
      </div>

      <!-- Hidden YouTube iframe. JavaScript controls play/pause using postMessage. -->
      <div id="ytContainer" hidden></div>
    </footer>
  </div>

  <!-- Main JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
